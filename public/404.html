<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EVERHIDE</title>
    <script>
      // SPA fallback: preserve path/query/hash and redirect to root so the React router can handle it.
      (function () {
        var l = window.location;
        var redirect = l.pathname + l.search + l.hash;
        sessionStorage.setItem('spa-redirect', redirect);
        l.replace(l.origin + '/');
      })();
    </script>
  </head>
  <body></body>
</html>
